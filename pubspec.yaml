name: nettemp_guard
description: Surveillance intelligente température — OMMP Bizerte
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 🌍 Localisation
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  provider: ^6.1.1

  # HTTP & WebSocket
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # MQTT pour ESP32
  mqtt_client: ^10.2.0

  # Stockage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Graphiques capteurs
  fl_chart: ^0.67.0

  # PDF export
  pdf: ^3.10.7
  printing: ^5.12.0

  # Image profil
  image_picker: ^1.0.7

  # Notifications push
  firebase_core: ^2.27.0
  firebase_messaging: ^14.9.0

  # Animations
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^11.3.0

  # ✅ Google OAuth — ouvrir navigateur
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/